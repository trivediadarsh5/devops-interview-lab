trigger:
  branches:
    include:
      - main
  paths:
    include:
      - frontend/**
      - azure-pipelines/app-frontend/**

pool:
  vmImage: ubuntu-latest

variables:
  nodeVersion: '20.x'
  sshServiceConnection: 'prod-vm-ssh'

stages:

#=========================================
# BUILD
#=========================================

- stage: Build
  displayName: Build Frontend

  jobs:

  - job: BuildFrontend
    displayName: Build React Application

    steps:

    - checkout: self

    - task: NodeTool@0
      displayName: Install NodeJS
      inputs:
        versionSpec: $(nodeVersion)

    - script: |
        cd frontend
        npm ci
      displayName: Install Dependencies

    - script: |
        cd frontend
        npm run build
      displayName: Build React App

    - script: |
        echo "Listing frontend directory..."
        ls -la frontend

        echo "Listing dist directory..."
        ls -la frontend/dist
      displayName: Verify Build Output

    - task: PublishBuildArtifacts@1
      displayName: Publish React Artifact
      inputs:
        PathtoPublish: frontend/dist
        ArtifactName: react-build
        publishLocation: Container

#=========================================
# DEPLOY
#=========================================

- stage: Deploy
  displayName: Deploy Frontend
  dependsOn: Build

  jobs:

  - deployment: DeployFrontend
    displayName: Deploy React to Production
    environment: Production

    strategy:
      runOnce:
        deploy:

          steps:

          - download: none

          - task: DownloadBuildArtifacts@0
            displayName: Download React Artifact
            inputs:
              buildType: current
              downloadType: single
              artifactName: react-build
              downloadPath: $(Pipeline.Workspace)

          - task: CopyFilesOverSSH@0
            displayName: Copy React Build
            inputs:
              sshEndpoint: $(sshServiceConnection)
              sourceFolder: $(Pipeline.Workspace)/react-build
              targetFolder: /home/azureuser/frontend
              cleanTargetFolder: true
              overwrite: true

          - task: SSH@0
            displayName: Deploy Frontend
            inputs:
              sshEndpoint: $(sshServiceConnection)
              runOptions: inline
              inline: |
                set -e

                echo "Cleaning existing website..."
                sudo rm -rf /var/www/html/*

                echo "Copying frontend to nginx..."
                sudo cp -r /home/azureuser/frontend/* /var/www/html/

                echo "Fixing ownership..."
                sudo chown -R www-data:www-data /var/www/html

                echo "Setting permissions..."
                sudo find /var/www/html -type d -exec chmod 755 {} \;
                sudo find /var/www/html -type f -exec chmod 644 {} \;

                echo "Testing nginx..."
                sudo nginx -t

                echo "Reloading nginx..."
                sudo systemctl reload nginx

                echo "Waiting..."
                sleep 5

                echo "Checking nginx..."
                sudo systemctl is-active nginx

                echo "Running Health Check..."
                curl -fsS http://localhost > /dev/null

                echo "Frontend deployed successfully."